networks:
  p2p_mesh:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  nodo_alpha:
    build: .
    container_name: nodo_alpha
    networks:
      p2p_mesh:
        ipv4_address: 172.20.0.10
    ports:
      - "8080:8080"
    command: ["--port", "8080"]
    stdin_open: true
    tty: true

  nodo_bravo:
    build: .
    container_name: nodo_bravo
    networks:
